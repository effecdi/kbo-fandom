app = 'olli-app'
primary_region = 'nrt'  # 도쿄 (한국에서 가장 빠름)

[build]

[env]
  NODE_ENV = 'production'
  PORT = '5000'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    type = 'http'
    port = 5000
    path = '/api/health'
    interval = '30s'
    timeout = '5s'
